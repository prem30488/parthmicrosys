version: '3.8'

services:
  # PostgreSQL Service
  postgres:
    image: postgres:15-alpine
    container_name: pdms-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pdms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pdms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  pdms-network:
    driver: bridge
